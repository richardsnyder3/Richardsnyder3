  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      height: 100%;

      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

      height: 100%;

      height: 100%;

    .leaf-btn, .knot-btn { cursor: pointer; }

      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      font-size: 24px;
      fill: #1a3a08;
      pointer-events: none;
      paint-order: stroke fill;
      stroke: #ffffff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .knot-label {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 17px;
      fill: #f5ead8;
      pointer-events: none;
      paint-order: stroke fill;
      stroke: #2a1a08;
      stroke-width: 2px;
    }
